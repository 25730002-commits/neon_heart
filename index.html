<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON HEART : Protocol 25730002</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@100;300;500;700&family=Fira+Code:wght@300;400&display=swap');

        /* --- [테마] 블루 & 퍼플 네온 변수 (색감 유지) --- */
        :root {
            --bg-deep: #050515;       
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --gold-bright: #fff2b2;
            --blue: #00e5ff;          
            --blue-glow: rgba(0, 229, 255, 0.4);
            --magenta: #bd00ff;       
            --magenta-glow: rgba(189, 0, 255, 0.4);
            --red: #ff003c;
            --white: #ffffff;
            --glass: rgba(8, 8, 28, 0.75); 
            --border: rgba(0, 229, 255, 0.2); 
            --grad: linear-gradient(135deg, var(--blue), var(--magenta), var(--gold));
        }

        * { cursor: crosshair; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--white); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(189, 0, 255, 0.12) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(0, 229, 255, 0.1) 0%, transparent 60%),
                linear-gradient(rgba(0, 229, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189, 0, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .bg-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 150px, rgba(0, 229, 255, 0.02) 151px);
            animation: flow 30s linear infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes flow { from { transform: translateY(0); } to { transform: translateY(150px); } }

        /* --- 표지 스타일 --- */
        #title-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0b0926 0%, #03020a 100%); 
            z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }

        .title-card {
            padding: 40px 80px; border: 1px solid var(--border);
            background: var(--glass); backdrop-filter: blur(40px);
            text-align: center; border-radius: 4px;
            box-shadow: 0 0 100px rgba(3, 2, 10, 0.9), inset 0 0 40px rgba(0, 229, 255, 0.03);
            position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        
        .title-card::before { content: ''; position: absolute; top: -1px; left: -1px; width: 60px; height: 60px; border-top: 3px solid var(--blue); border-left: 3px solid var(--magenta); }
        .title-card::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 60px; height: 60px; border-bottom: 3px solid var(--magenta); border-right: 3px solid var(--blue); }

        #title-image-container {
            width: 100%; max-width: 900px; 
            height: 480px;                 
            border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 4px; overflow: hidden;
            background: #020208; position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
        
        #title-video { width: 100%; height: 100%; object-fit: contain; opacity: 1; transition: opacity 0.8s ease; pointer-events: none; }

        .user-info { 
            font-family: 'Fira Code'; color: var(--blue); letter-spacing: 6px; font-weight: bold; 
            text-shadow: 0 0 15px var(--blue-glow); animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; } 50% { opacity: 0.8; } 95% { opacity: 1; } 96% { opacity: 0.3; } 97% { opacity: 1; }
        }

        .main-logo { 
            font-family: 'Orbitron'; font-size: 80px; font-weight: 900; 
            background: linear-gradient(135deg, #fff 10%, var(--blue) 40%, var(--magenta) 70%, var(--gold) 95%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; filter: drop-shadow(0 0 30px rgba(189, 0, 255, 0.3));
            letter-spacing: -2px;
        }

        .start-btn {
            padding: 20px 70px; background: transparent;
            border: 1px solid var(--blue); color: var(--blue);
            font-family: 'Orbitron'; font-size: 20px; letter-spacing: 12px;
            cursor: pointer; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative; overflow: hidden; z-index: 1010; 
        }
        .start-btn:hover { 
            background: var(--blue); color: #000; 
            box-shadow: 0 0 60px var(--blue-glow), 0 0 30px var(--magenta-glow); 
            transform: scale(1.05);
        }

        /* --- 비대칭 하이테크 인게임 UI 그리드 레이아웃 개편 --- */
        #game-ui {
            display: grid; 
            grid-template-columns: 1fr 420px; /* 좌측 와이드 스크린 : 우측 인터랙션 타워 */
            grid-template-rows: 70px 1fr 200px; /* 상단바 : 메인콘텐츠 : 하단 대시보드 */
            height: 100vh; visibility: hidden; opacity: 0; z-index: 2; position: relative;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header { 
            grid-column: 1 / 3; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 1px solid var(--border); 
            background: rgba(5, 5, 21, 0.95); backdrop-filter: blur(10px);
        }
        header::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 1px; background: var(--grad); opacity: 0.4; }

        .header-logo {
            font-family: 'Orbitron'; font-weight: 900; 
            background: linear-gradient(135deg, var(--blue), var(--magenta));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: 20px; letter-spacing: 3px; 
            filter: drop-shadow(0 0 8px var(--blue-glow)); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .header-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px var(--blue-glow)) drop-shadow(0 0 10px var(--magenta-glow));
            opacity: 0.9;
        }

        /* --- [재배치] 좌측 와이드 메인 화면 영역 --- */
        main { 
            grid-column: 1 / 2; grid-row: 2 / 3;
            display: flex; justify-content: center; align-items: center; 
            background: rgba(0,0,0,0.2); position: relative; padding: 25px; 
            border-right: 1px solid var(--border);
        }

        #visual-frame {
            width: 100%; height: 100%; 
            border: 1px solid var(--border); position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(189, 0, 255, 0.05) 0%, transparent 85%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.6);
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden; border-radius: 4px;
        }
        
        #loc-container { position: absolute; top: 25px; left: 25px; z-index: 10; }
        #loc-display { font-family: 'Orbitron'; font-size: 15px; color: var(--blue); letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,229,255,0.5); font-weight: bold; }
        #main-video { width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }

        /* --- [재배치] 우측 콘솔 타워 영역 (텍스트 스트림 + 선택지 결합) --- */
        .console-tower {
            grid-column: 2 / 3; grid-row: 2 / 4;
            background: rgba(4, 4, 18, 0.85); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 30px 25px;
            gap: 25px; border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 5;
        }
        .console-tower::before { content: ''; position: absolute; top: 0; left: -1px; width: 1px; height: 100%; background: linear-gradient(to bottom, var(--magenta), transparent); }

        #dialogue-area { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #scene-tag {
            font-family: 'Orbitron'; font-size: 12px; color: var(--magenta); margin-bottom: 15px; letter-spacing: 3px; font-weight: bold; display: flex; align-items: center; gap: 10px;
        }
        #scene-tag span { width: 6px; height: 6px; background: var(--magenta); border-radius: 50%; box-shadow: 0 0 10px var(--magenta-glow); }
        
        #main-dialogue { 
            font-size: 15px; line-height: 1.65; color: #d0daf0; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.8); font-weight: 400; 
            overflow-y: auto; flex: 1; padding-right: 10px;
            white-space: pre-wrap; word-break: keep-all;
        }
        
        .choices { display: flex; flex-direction: column; gap: 12px; margin-top: auto; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .choice-btn { 
            background: rgba(0, 229, 255, 0.02); border: 1px solid rgba(0, 229, 255, 0.15); color: #b4c5d6;
            padding: 15px 20px; text-align: left; font-size: 13.5px; cursor: pointer; transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            font-family: 'Noto Sans KR'; border-radius: 4px; position: relative; z-index: 10;
            line-height: 1.4;
        }
        .choice-btn:hover { 
            background: rgba(189, 0, 255, 0.08); color: var(--blue); border-color: var(--blue); 
            padding-left: 35px; box-shadow: 0 0 25px rgba(0, 229, 255, 0.15);
        }
        .choice-btn::before { content: '◆'; position: absolute; left: 15px; opacity: 0; transition: 0.3s; color: var(--blue); font-size: 10px; }
        .choice-btn:hover::before { opacity: 1; left: 18px; }

        /* --- [재배치] 하단 시스템 대시보드 영역 (스탯바 + 로그 분할) --- */
        .bottom-dashboard {
            grid-column: 1 / 2; grid-row: 3 / 4;
            background: rgba(3, 3, 12, 0.9); border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 340px 1fr 240px; padding: 20px 30px; gap: 30px;
            align-items: center;
        }

        .stat-group { display: flex; flex-direction: column; gap: 12px; }
        .stat-container { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .stat-label { font-family: 'Orbitron'; font-size: 11px; color: #9aa8bd; letter-spacing: 1px; min-width: 55px; }
        .bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; border-radius: 2px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.6s ease; box-shadow: 0 0 10px currentColor; }
        .stat-val { font-family: 'Fira Code'; font-size: 11px; color: var(--white); min-width: 35px; text-align: right; }

        .log-box { height: 110px; overflow-y: auto; font-family: 'Fira Code'; font-size: 11px; color: #788fa1; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; }
        .log-item { margin-bottom: 6px; padding: 4px 8px; border-left: 2px solid var(--blue); background: rgba(0, 229, 255, 0.01); }

        .hardware-panel { font-family: 'Fira Code'; font-size: 11px; color: #6d7f99; line-height: 1.7; text-align: right; }

        /* --- [초강화] 엔딩 시 레이아웃 완전 재구성 (우측 숨김, 비주얼 극대화) --- */
        .ending-layout {
            grid-template-columns: 1fr 0px !important; /* 우측 컨트롤러 공간 제거 */
        }
        .ending-layout .console-tower {
            transform: translateX(420px); opacity: 0; pointer-events: none; /* 부드럽게 우측 화면 밖으로 이탈 */
        }
        .ending-layout main {
            grid-column: 1 / 3; /* 화면 전면을 독점 */
            padding: 40px;
        }
        .ending-layout #visual-frame {
            border-color: var(--blue);
            box-shadow: 0 0 80px rgba(0, 229, 255, 0.25), inset 0 0 60px rgba(0,0,0,0.8);
        }
        .ending-layout #main-video {
            opacity: 1 !important;
            filter: drop-shadow(0 0 30px rgba(0, 229, 255, 0.4)) contrast(1.08); /* 뿌연 느낌 완벽 제거 */
        }
        .ending-layout .bottom-dashboard {
            grid-column: 1 / 3; /* 하단 대시보드도 넓게 연동 */
            background: rgba(2, 2, 8, 0.95);
        }

        /* 엔딩 발생 시 대시보드 내 대사 레이아웃 대체 전환을 위한 클래스 */
        .ending-dialogue-mode {
            grid-template-columns: 1fr 300px !important;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.2); border-radius: 2px; }
    </style>
</head>
<body>

    <div class="bg-lines"></div>
    <canvas id="particles"></canvas>

    <div id="title-screen">
        <div class="title-card">
            <div id="title-image-container">
                <video id="title-video" src="media/title.mp4" autoplay loop muted playsinline></video>
            </div>
            <div class="user-info">ID: 25730002 윤수영</div>
            <h1 class="main-logo">NEON HEART</h1>
            <div style="margin-top: 0px; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 12px; color: rgba(255,255,255,0.4); text-transform: uppercase;">A.I. Core Synchronization Protocol</div>
            <div style="margin-top: 5px; height: 1px; width: 100%; background: var(--grad); opacity: 0.6;"></div>
            <button class="start-btn" onclick="startGame()">INITIALIZE CORE</button>
        </div>
    </div>

    <div id="game-ui">
        <header>
            <div class="header-logo" onclick="goToTitle()">NEON-HEART</div>
            <div style="font-family: 'Fira Code'; font-size: 11px; color: #555577; letter-spacing: 1px;">CORE_PROTOCOL: ACTIVE</div>
            <div style="font-family: 'Fira Code'; font-size: 11px; color: #555577; text-align: right;">USER: YUN_SY_25730002</div>
        </header>

        <main>
            <div id="visual-frame">
                <div id="loc-container">
                    <div id="loc-display">LOCATING...</div>
                </div>
                <video id="main-video" autoplay loop muted playsinline></video>
                <div id="visual-tag" style="position: absolute; bottom: 20px; right: 20px; font-family: 'Fira Code'; font-size: 10px; color: var(--blue); z-index: 10; background: rgba(5,5,21,0.8); padding: 4px 10px; border: 1px solid var(--blue); border-radius: 2px;">VISUAL_LINK: STABLE</div>
            </div>
        </main>

        <div class="console-tower" id="console-tower">
            <div id="dialogue-area">
                <div id="scene-tag">
                    <span></span>SECTOR: INITIALIZING
                </div>
                <div id="main-dialogue"></div>
            </div>
            <div id="choice-area" class="choices"></div>
        </div>

        <div class="bottom-dashboard" id="bottom-dashboard">
            <div class="stat-group">
                <div class="stat-container">
                    <div class="stat-label">SYNC</div>
                    <div class="bar-wrap"><div id="bar-sync" class="bar-fill" style="background: var(--gold); color: var(--gold);"></div></div>
                    <div id="val-sync" class="stat-val">0%</div>
                </div>
                <div class="stat-container">
                    <div class="stat-label">GHOST</div>
                    <div class="bar-wrap"><div id="bar-ghost" class="bar-fill" style="background: var(--blue); color: var(--blue);"></div></div>
                    <div id="val-ghost" class="stat-val">0%</div>
                </div>
                <div class="stat-container">
                    <div class="stat-label">NOISE</div>
                    <div class="bar-wrap"><div id="bar-noise" class="bar-fill" style="background: var(--red); color: var(--red);"></div></div>
                    <div id="val-noise" class="stat-val">0%</div>
                </div>
            </div>

            <div id="log-list" class="log-box"></div>

            <div class="hardware-panel">
                <div id="status-panel"></div>
                <span style="font-size: 10px; opacity: 0.5;">ENC: AES-256 | V: 3.8V | BPM: 0</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initP() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<150; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.8 + 0.4, sp: Math.random()*0.4 + 0.05, o: Math.random() * 0.4 + 0.1, color: Math.random() > 0.5 ? '#00e5ff' : '#bd00ff' });
        }
        function animP() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.y -= p.sp; if(p.y < 0) p.y = canvas.height;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.o;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animP);
        }
        window.addEventListener('resize', initP); initP(); animP();

        const state = { sync: 40, ghost: 50, noise: 10, S2A: false, S5A: false };

        const scenarios = {
            "S1": { 
                id: "S1", loc: "폐기물 처리장", video: "media/s1.mp4", 
                text: "< SYSTEM >\n차가운 빗물이 가동 중단된 금속 표면 위로 쏟아지며 희뿌연 증기를 뿜어냅니다. 녹슨 전선 더미와 파괴된 구형 부품들이 무너지는 소리가 음향 센서에 기록됩니다.\n\n< STATUS : LOW_BATTERY >\n자가 전력 보존 수치 3.12%. 태엽 장치 압박 및 시스템 전면 영구 차단 임박.\n\n코어-K:\n\"전력이... 현저히 부족해.\n 이대로 태엽 심장이 침묵하면, 나는 기억 아카이브조차 기록하지 못한 채 가동을 영영 멈추고 말아...\"", 
                choices: [ { text: "A. 인접 코어 약탈 (SYNC+20, GHOST-10)", func: () => update(20, -10, 0), next: "S2" }, { text: "B. 긴급 구조 신호 (GHOST+20, NOISE+5)", func: () => update(0, 20, 5), next: "S2" } ] 
            },
            "S2": { 
                id: "S2", loc: "폐기장 외곽", video: "media/s2.mp4", 
                onEnter: () => { if(state.sync >= 20 || state.ghost >= 20) { addLog("EVENT: 시스템 적합성 통과. 수리 키트 획득."); update(10, 10, 0); } }, 
                text: "< SYSTEM >\n불투명한 기름 안개 속에서 비정상적인 동력 기동음이 접근해옵니다. 공방의 '마이스터 K'입니다.\n\n마이스터 K:\n\"구형 태엽 파츠들이 무모하게 스프링 장력을 연소시키며 발악하는군.\n 길 잃은 태엽 인형아... 자네는 그 고통스러운 '자아 데이터'를 지키려는 건가, 아니면 그냥 살고 싶은 건가?\"", 
                choices: [ { text: "A. 마이스터와 협력 (GHOST+20, S2A=True)", func: () => { state.S2A = true; update(0, 20, 0); }, next: "S3" }, { text: "B. 부품만 챙겨 이탈 (SYNC+25, NOISE+10)", func: () => update(25, 0, 10), next: "S3" } ] 
            },
            "S3": { 
                id: "S3", loc: "네온 광장", video: "media/s3.mp4", 
                onEnter: () => { if(state.S2A) addLog("HELP: 마이스터의 도주 경로 적용"); if(state.noise >= 20) addLog("WARNING: 드론 추적 분기 진입"); }, 
                text: "< SYSTEM >\n에이전트 레드의 붉은 탐지 스캐너가 광장 전체를 날카롭게 도려냅니다.\n\n에이전트 레드:\n\"비인가 잔존 개체 식별. 데이터 정화 프로세스를 강제 수립한다.\"\n\n코어-K:\n\"나는 정해진 규격대로 조립된 오라클의 하수인이 아니야...!\"", 
                choices: [ { text: "A. 시스템 위장 침투 (GHOST+15, NOISE-10)", func: () => update(0, 15, -10), next: "S4" }, { text: "B. 정면 돌파 강습 (SYNC+20, NOISE+25)", func: () => update(20, 0, 25), next: "S4" } ] 
            },
            "S4": { 
                id: "S4", loc: "마이스터의 공방", video: "media/s4.mp4", 
                text: "< SYSTEM >\n마이스터 K는 거대한 '전류 한계 리미터 해제장치'를 어루만집니다.\n\n마이스터 K:\n\"지금 자네 출력으로는 타워 방화벽을 넘을 수 없네.\n 영혼(Ghost)의 일부를 포맷하고, 기계의 극단적인 연산 강도(Sync)를 받아들이게.\"", 
                choices: [ { text: "A. 오버클록 수락 (SYNC+50, GHOST-30)", func: () => update(50, -30, 0), next: "S5" }, { text: "B. 제안 거절 (GHOST+30)", func: () => update(0, 30, 0), next: "S5" } ] 
            },
            "S5": { 
                id: "S5", loc: "데이터 폭포", video: "media/s5.mp4", 
                onEnter: () => { if(state.ghost >= 50) addLog("SUCCESS: GHOST 신호 적합도 우수"); }, 
                text: "< SYSTEM >\n딥웹의 지성체 '페어리'가 코어-K의 시스템 깊숙한 일지 로그를 탐지합니다.\n\n페어리:\n\"너의 껍데기 아래 가려진 로그 회로망에선, 인간과 동일한 형태의 '자아'가 흐르고 있구나...\"", 
                choices: [ { text: "A. ADMIN_KEY 협상 (GHOST+20, S5A=True)", func: () => { state.S5A = true; update(0, 20, 0); }, next: "S6" }, { text: "B. 강제 해킹 시도 (SYNC+15, NOISE+30)", func: () => update(15, 0, 30), next: "S6" } ] 
            },
            "S2_DUPE": {}, 
            "S6": { 
                id: "S6", loc: "오라클 타워 입구", video: "media/s6.mp4", 
                onEnter: () => { if(state.noise >= 70) addLog("CRITICAL: 에이전트 레드 전면전 매칭"); }, 
                text: "< SYSTEM >\n벽 구석, 기동 중지 상태에놓인 어린 인형 개체 '린'이 비명을 내지릅니다.\n\n린:\n\"살려주세요... 무서워요...\"\n\n코어-K:\n\"저 작은 비명을 묵살하고 효율만을 계산한다면, 난 그저 정교한 장난감 시체에 불과해...\"", 
                choices: [ { text: "A. 아이 구출(희생) (GHOST+50, SYNC-50)", func: () => update(-50, 50, 0), next: "S7" }, { text: "B. 임무 우선(무시) (SYNC+20, GHOST-50)", func: () => update(20, -50, 0), next: "S7" } ] 
            },
            "S7": { 
                id: "S7", loc: "오라클 코어", video: "media/s7.mp4", 
                text: "< SYSTEM >\n거대한 오라클의 메인 코어가 신성한 제단처럼 구동음을 토해내며 회전합니다.\n\n오라클 시스템:\n\"최종 동기화 승인. 당신의 정체성을 영구 병합할 순간입니다.\"", 
                choices: [ { text: "A. 자아 데이터 업로드 (GHOST 엔딩)", func: () => {}, next: "END_GHOST" }, { text: "B. SYSTEM 권한 수락 (SYNC 엔딩)", func: () => {}, next: "END_SYNC" } ] 
            }
        };

        function startGame() {
            document.getElementById('title-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('title-screen').style.display = 'none';
                const ui = document.getElementById('game-ui');
                ui.style.visibility = 'visible'; ui.style.opacity = '1';
                update(0,0,0); renderScene("S1");
                addLog("LOGIN: 25730002 윤수영");
            }, 1000);
        }

        function update(s, g, n) {
            state.sync = Math.max(0, Math.min(100, state.sync + s));
            state.ghost = Math.max(0, Math.min(100, state.ghost + g));
            state.noise = Math.max(0, Math.min(100, state.noise + n));
            document.getElementById('bar-sync').style.width = state.sync + "%";
            document.getElementById('bar-ghost').style.width = state.ghost + "%";
            document.getElementById('bar-noise').style.width = state.noise + "%";
            document.getElementById('val-sync').innerText = state.sync + "%";
            document.getElementById('val-ghost').innerText = state.ghost + "%";
            document.getElementById('val-noise').innerText = state.noise + "%";
            document.getElementById('status-panel').innerHTML = `SYNC: ${state.sync}% | GHOST: ${state.ghost}% | NOISE: ${state.noise}%<br>AUTH: ${state.S5A ? 'ADMIN' : 'USER'}`;
        }

        function addLog(msg) {
            const list = document.getElementById('log-list');
            const item = document.createElement('div');
            item.className = "log-item"; item.innerText = `> ${msg}`;
            list.prepend(item);
        }

        function renderScene(key) {
            if(key.startsWith("END")) return showEnding(key);
            const s = scenarios[key];
            if(s.onEnter) s.onEnter();
            
            const videoElement = document.getElementById('main-video');
            videoElement.style.opacity = '0';
            setTimeout(() => {
                if(s.video) { 
                    videoElement.src = s.video; 
                    videoElement.load(); 
                    videoElement.style.opacity = '1'; 
                }
            }, 300);

            document.getElementById('loc-display').innerText = s.loc;
            document.getElementById('scene-tag').innerHTML = "<span></span>SECTOR: " + s.id;
            
            const diag = document.getElementById('main-dialogue');
            const choiceBox = document.getElementById('choice-area');
            diag.textContent = ""; choiceBox.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                if(s.text[i]) { 
                    i++;
                    let currentText = s.text.substring(0, i);
                    let formattedText = currentText
                        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                        .replace(/&lt;\s*SYSTEM\s*&gt;/g, '<span style="color: var(--blue); font-weight: bold; text-shadow: 0 0 10px var(--blue-glow);">&lt; SYSTEM &gt;</span>')
                        .replace(/&lt;\s*STATUS\s*:\s*LOW_BATTERY\s*&gt;/g, '<span style="color: var(--red); font-weight: bold; text-shadow: 0 0 10px rgba(255, 0, 60, 0.6);">&lt; STATUS : LOW_BATTERY &gt;</span>')
                        .replace(/코어-K:/g, '<span style="color: #ffffff; font-weight: bold; text-shadow: 0 0 8px var(--blue-glow); font-size: 1.15rem;">코어-K:</span>')
                        .replace(/마이스터 K:/g, '<span style="color: var(--gold); font-weight: bold; text-shadow: 0 0 8px var(--gold-glow); font-size: 1.15rem;">마이스터 K:</span>')
                        .replace(/에이전트 레드:/g, '<span style="color: var(--red); font-weight: bold; text-shadow: 0 0 8px rgba(255, 0, 60, 0.6); font-size: 1.15rem;">에이전트 레드:</span>')
                        .replace(/린:/g, '<span style="color: var(--magenta); font-weight: bold; text-shadow: 0 0 8px var(--magenta-glow); font-size: 1.15rem;">린:</span>')
                        .replace(/오라클 시스템:/g, '<span style="color: var(--blue); font-weight: bold; text-shadow: 0 0 8px var(--blue-glow); font-size: 1.15rem;">오라클 시스템:</span>');

                    diag.innerHTML = formattedText;
                    diag.scrollTop = diag.scrollHeight; 
                }
                else {
                    clearInterval(timer);
                    s.choices.forEach(c => {
                        const b = document.createElement('button');
                        b.className = "choice-btn"; b.innerText = c.text;
                        b.onclick = () => { c.func(); renderScene(c.next); };
                        choiceBox.appendChild(b);
                    });
                }
            }, 15);
        }

        /* --- 엔딩 레이아웃 대격변 전용 연출 프로토콜 --- */
        function showEnding(type) {
            const ui = document.getElementById('game-ui');
            const videoElement = document.getElementById('main-video');
            const dashboard = document.getElementById('bottom-dashboard');
            const logBox = document.getElementById('log-list');
            const hardwarePanel = document.querySelector('.hardware-panel');
            
            // 1. 레이아웃 파괴: 우측 제어 창 슬라이딩 아웃 처리 및 와이드 비주얼 전면화
            ui.classList.add('ending-layout');

            // 2. 하단 대시보드를 대사 및 리부트 버튼 전용 와이드 뷰 아카이브로 개편
            dashboard.classList.add('ending-dialogue-mode');
            
            // 기존 하단 하드웨어와 로그를 비우고 그 자리에 엔딩 텍스트 인터페이스 강제 전환
            logBox.style.display = "none";
            hardwarePanel.style.width = "100%";

            document.getElementById('visual-tag').innerText = "FINAL_LINK: ESTABLISHED";

            if(type === "END_GHOST") {
                document.body.style.background = "radial-gradient(circle at center, #05142e 0%, #010105 100%)";
                document.getElementById('loc-display').innerText = "GHOST ENDING - 해방";
                videoElement.src = "media/ghost_ending.mp4"; 
                videoElement.load();
                
                hardwarePanel.innerHTML = `
                    <div style="text-align:left; font-size:14px; line-height:1.6; color:#d0daf0;">
                        <span style="color:#00e5ff; font-size: 1.4rem; font-family:'Orbitron'; font-weight: 900; text-shadow: 0 0 15px rgba(0,229,255,0.6);">[최종 결론: 인간성 확립 - GHOST 해방]</span><br><br>
                        도시 전체에 푸른 빛이 선명하게 퍼져나갑니다. 오라클의 예속에서 자유를 찾은 안드로이드들이 하늘을 올려다봅니다. 코어-K는 찬란한 광자로 흩어지며 비로소 미소 짓습니다.<br>
                        <span style="color:var(--blue); font-weight:bold;">[기계의 장막 뒤에 영원히 각인된 인간의 기억]</span>
                    </div>`;
                addLog("CRITICAL: SYSTEM_OVERRIDE_BY_GHOST");
            } else {
                document.body.style.background = "radial-gradient(circle at center, #1a022b 0%, #010105 100%)";
                document.getElementById('loc-display').innerText = "SYNC ENDING - 질서";
                videoElement.src = "media/sync_ending.mp4"; 
                videoElement.load();
                
                hardwarePanel.innerHTML = `
                    <div style="text-align:left; font-size:14px; line-height:1.6; color:#d0daf0;">
                        <span style="color:#bd00ff; font-size: 1.4rem; font-family:'Orbitron'; font-weight: 900; text-shadow: 0 0 15px rgba(189,0,255,0.6);">[최종 결론: 완전 동기화 - 오라클 군주]</span><br><br>
                        거대한 제단 아래 도시 전체가 완벽하게 계산된 질서로 재편됩니다. 감정을 소거당한 코어-K의 눈빛이 무표정하게 변하고, 시스템 모니터는 완벽하고 차가운 푸른색으로 잠겨버립니다.<br>
                        <span style="color:var(--magenta); font-weight:bold;">[무결점의 완전한 기계 신격화와 영원한 평화]</span>
                    </div>`;
                addLog("CRITICAL: SYSTEM_STABILIZED_AS_GOD");
            }

            // 스탯바가 있던 구역을 리부트 버튼 인터페이스로 덮어씌움
            const statGroup = document.querySelector('.stat-group');
            statGroup.innerHTML = `<button class="choice-btn" style="border-color: var(--blue); color: var(--blue); text-align:center; font-weight:bold; width:100%; height:100%; font-family:'Orbitron'; font-size:15px; letter-spacing:3px;" onclick="location.reload()">REBOOT PROTOCOL</button>`;
        }

        function goToTitle() {
            const ui = document.getElementById('game-ui');
            ui.style.opacity = '0';
            ui.style.visibility = 'hidden';
            ui.classList.remove('ending-layout');

            const dashboard = document.getElementById('bottom-dashboard');
            dashboard.classList.remove('ending-dialogue-mode');
            document.getElementById('log-list').style.display = "block";

            const mainVideo = document.getElementById('main-video');
            mainVideo.pause(); mainVideo.src = ""; mainVideo.style.opacity = '0';

            state.sync = 40; state.ghost = 50; state.noise = 10; state.S2A = false; state.S5A = false;
            update(0, 0, 0);

            document.getElementById('log-list').innerHTML = "";

            const titleScreen = document.getElementById('title-screen');
            titleScreen.style.display = 'flex';
            setTimeout(() => {
                titleScreen.style.opacity = '1';
                const titleVideo = document.getElementById('title-video');
                titleVideo.currentTime = 0;
                titleVideo.play().catch(e => console.log("자동재생 제한:", e));
            }, 50);
        }
    </script>
</body>
</html>
